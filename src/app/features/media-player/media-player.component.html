@if (media(); as item) {

  @if (loadError()) {
    <div class="container my-4">
      <p class="alert alert-warning mb-0 text-center">Media not found.</p>
    </div>
  } @else if (item.type === 'mp3') {
    <div class="container my-4 media-player">
      <div class="card shadow rounded-4 mx-auto">
        <div class="card-body text-center">
          <h2 class="card-title h4 mb-3">{{ item.name }}</h2>
          <img
            [src]="item.placeholder"
            [alt]="item.name"
            class="img-fluid placeholder-img mb-3"
            alt=""
          />
          <audio
            #audioEl
            class="w-100"
            controls
            autoplay
            preload="auto"
            (error)="onMediaError()"
          >
            <source [src]="item.source" type="audio/mpeg" />
            Votre navigateur ne supporte pas la lecture audio.
          </audio>
        </div>
      </div>
    </div>
  } @else {
    <div class="video-stage">
      <video
        #videoEl
        class="video-fullscreen"
        controls
        autoplay
        playsinline
        preload="auto"
        [poster]="item.placeholder"
        (error)="onMediaError()"
      >
        <source [src]="item.source" type="video/mp4" />
        Votre navigateur ne supporte pas la lecture vidéo.
      </video>
    </div>
  }

} @else {
  <div class="container my-4">
    <p class="alert alert-warning mb-0 text-center">Media not found.</p>
  </div>
}
